<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ChronoAI — Automated conflict-free academic timetable scheduling for college departments. Supports HOD and Staff roles with MySQL-backed data." />
    <meta name="keywords" content="timetable, scheduling, academic, HOD, college, ChronoAI" />
    <title>ChronoAI — Academic Timetable System</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply stored theme before React loads (prevents flash)
      (function() {
        const t = localStorage.getItem('chronoai_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
